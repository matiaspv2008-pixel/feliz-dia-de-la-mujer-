<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Día de la Mujer</title>

<style>

body{
margin:0;
font-family: Arial;
background: linear-gradient(135deg,#ff9ac9,#b14cff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* CORAZONES FONDO */

.corazones{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
}

.corazones span{
position:absolute;
color:#ff2e93;
font-size:40px;
animation:flotar 10s linear infinite;
opacity:0.8;
}

.corazones span:nth-child(1){left:10%;animation-duration:12s;}
.corazones span:nth-child(2){left:20%;animation-duration:8s;}
.corazones span:nth-child(3){left:35%;animation-duration:10s;}
.corazones span:nth-child(4){left:50%;animation-duration:7s;}
.corazones span:nth-child(5){left:65%;animation-duration:11s;}
.corazones span:nth-child(6){left:80%;animation-duration:9s;}
.corazones span:nth-child(7){left:90%;animation-duration:13s;}
.corazones span:nth-child(8){left:40%;animation-duration:6s;}

@keyframes flotar{

0%{
transform:translateY(100vh) rotate(0deg) scale(1);
}

100%{
transform:translateY(-10vh) rotate(360deg) scale(1.5);
}

}

/* CAJA PASTEL */

.caja{
background:#fff3e6;
padding:40px;
border-radius:20px;
text-align:center;
width:350px;

box-shadow:
0 0 10px #ff9ac9,
0 0 20px #ff9ac9,
0 0 40px #ff9ac9;

position:relative;
z-index:2;

color:#b30059;
}

/* TITULO */

h1{
color:#cc0066;
}

/* INPUT PASTEL NEON */

input{
width:80%;
padding:14px;
border-radius:12px;
border:none;
font-size:18px;
outline:none;

background:#fffaf5;
color:#b30059;

box-shadow:
0 0 5px #ff9ac9,
0 0 10px #ff9ac9,
0 0 20px #ff9ac9;

transition:0.3s;
}

input:focus{
box-shadow:
0 0 10px #ff9ac9,
0 0 20px #ff9ac9,
0 0 40px #ff9ac9,
0 0 80px #ff9ac9;
}

/* BOTON */

button{
margin-top:20px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e60073;
transform:scale(1.1);
box-shadow:
0 0 10px #ff9ac9,
0 0 20px #ff9ac9,
0 0 40px #ff9ac9;
}

#pantalla2{
display:none;
}

#mensaje{
font-size:22px;
color:#cc0066;
}

</style>
</head>

<body>

<div class="corazones">
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
</div>

<div class="caja" id="pantalla1">

<h1>🌸 Día de la Mujer 🌸</h1>

<p>Escribe tu nombre</p>

<input type="text" id="nombre">

<br>

<button onclick="continuar()">Continuar</button>

</div>

<div class="caja" id="pantalla2">

<h1>💐 Mensaje 💐</h1>

<p id="mensaje"></p>

</div>

<script>

function continuar(){

let nombre = document.getElementById("nombre").value.toLowerCase();
let mensaje="";

if(nombre=="luana" || nombre=="kiara" || nombre=="sarai" || nombre=="daniela" || nombre=="dayana"){
mensaje = nombre + " prima, feliz Día de la Mujer 💖 espero que la pases bien hoy.";
}

else if(nombre=="betty" || nombre=="patty" || nombre=="julia" || nombre=="blanca" || nombre=="sara"){
mensaje = nombre + " tía, feliz Día de la Mujer 💖 espero que la pases bien hoy.";
}

else if(nombre=="veronica" || nombre=="alicia"){
mensaje = nombre + " madre querida, feliz Día de la Mujer 💖 espero no hacerte enojar el día de hoy.";
}

else{
mensaje = "Feliz Día de la Mujer 💖 espero que la pases bien hoy.";
}

document.getElementById("pantalla1").style.display="none";
document.getElementById("pantalla2").style.display="block";

document.getElementById("mensaje").innerHTML = mensaje;

}

</script>

</body>
</html>
